<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ჩემს პრინცესას</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Georgia', serif;
            background: radial-gradient(circle, #fff0f5 0%, #ffc0cb 100%);
            overflow: hidden;
            color: #5a2e3d;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        h1 {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 10px;
            padding: 0 20px;
        }

        .sub-text {
            font-size: 0.9rem;
            color: #d63384;
            margin-bottom: 30px;
        }

        .flowers-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .flower {
            font-size: 3.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .flower:active {
            transform: scale(0.8);
        }

        .message-content {
            background: rgba(255, 255, 255, 0.7);
            padding: 30px 20px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            z-index: 20;
            line-height: 1.6;
            font-size: 1.1rem;
            font-style: italic;
        }

        #back-button {
            margin-top: 25px;
            background: #ff69b4;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .explosion-heart {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        #heart-rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .falling-heart {
            position: absolute;
            top: -10%;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="main-screen" class="screen active">
        <h1>დილა მშვიდობისა ჩემო პატარა პრინცესა</h1>
        <p class="sub-text">დააჭირე სხვადასხვა ყვავილს</p>
        <div class="flowers-container">
            <div class="flower" data-id="0">🌷</div>
            <div class="flower" data-id="1">🌷</div>
            <div class="flower" data-id="2">🌷</div>
            <div class="flower" data-id="3">🌷</div>
            <div class="flower" data-id="4">🌷</div>
        </div>
    </div>

    <div id="message-screen" class="screen">
        <div id="heart-rain-container"></div>
        <div class="message-content">
            <div id="message-text"></div>
            <button id="back-button" onclick="goBack()">უკან დაბრუნება</button>
        </div>
    </div>

    <script>
        const messages = [
            "ჩემო პატარა პრინცესა, მინდა იცოდე, რომ უზომოდ მიყვარხარ და მუდამ შენს გვერდით ვიქნები. ყველაფერ ცუდს ერთად გადავლახავთ და ერთად შევქმნით ჩვენს ბედნიერ ცხოვრებას.",
            "ჩემი ცხოვრების არსი ხარ, ჩემი პატარა ანგელოზი. ვერასდროს ვიფიქრებდი, რომ ოდესმე ვინმე გახდებოდა ჩემთვის ასეთი მნიშვნელოვანი და ძვირფასი. უზომოდ ბედნიერი ვარ, რომ მყავხარ. ყველაფერს ვიზამ შენი ბედნიერებისთვის. მინდა ყველაზე ბედნიერი ქალი იყო ჩემს გვერდით.",
            "ჩემო პატარა ანგელოზო, ჩემო სასწაულო, ჩემო მზის სხივო და სითბოვ. უზომოდ მადლიერი ვარ შენით. ჩემი ცხოვრება 180 გრადუსით შეცვალე და აზრი შესძინე. მთელი ჩემი სამყაროს არსი ხარ, უზომოდ მიყვარხარ.",
            "ჩემო მომავალო მეუღლევ, ჩემო დედოფალო, სული ერთი მაქვს როდის მოვა ის დრო, როცა ჩვენი ოჯახი გვექნება. როდის მოვა ის წამი, როცა ჩვენი ბუდე აშენებული იქნება. ყოველ საღამოს ჩვენს სახლში მოვალ და ჩაგეხუტები, გულში ჩაგიკრავ და დაგიკოცნი მთელ სახეს. ვეღარც კი ვითმენ როდის ირბენენ ჩვენი პატარა სიყვარულის ნაყოფები ჩვენს ბუდეში. ყველაფერს გავიღებ იმისთვის, რომ უბედნიერესი ოჯახი გვქონდეს.",
            "ჩემი სიყვარული ხარ, ჩემი არსი, ჩემი მეს დედოფალი. მთელი ჩემი სამყარო შენს გარშემო ტრიალებს, ჩემი ყოველი ფიქრი შენ გეკუთვნის, ჩემი ყოველი ამოსუნთქვა შენია, შენთვის ვცოცხლობ ჩემო პატარა. შენდამი გრძნობებია ის, რაც მე მე მხდის. უზომოდ მიყვარხარ ჩემო ცხოვრებავ. უსასრულობაც არ მეყოფა იმის აღსაწერად, თუ რა ძლიერ მიყვარხარ, როგორ ძლიერ გნატრობ და როგორ ბედნიერი ვარ იმ ფაქტით, რომ მყავხარ. მადლობა ჩემო პატარა, ყველაფრისთვის მადლობა."
        ];

        function createExplosion(x, y) {
            for (let i = 0; i < 10; i++) {
                const heart = document.createElement('div');
                heart.innerText = '❤️';
                heart.className = 'explosion-heart';
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 80 + 30;
                heart.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                heart.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 800);
            }
        }

        document.querySelectorAll('.flower').forEach(flower => {
            flower.addEventListener('click', function(e) {
                createExplosion(e.clientX, e.clientY);
                document.getElementById('message-text').innerText = messages[this.getAttribute('data-id')];
                document.getElementById('main-screen').classList.remove('active');
                document.getElementById('message-screen').classList.add('active');
                startRain();
            });
        });

        function startRain() {
            window.rainInterval = setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '💖';
                heart.className = 'falling-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.getElementById('heart-rain-container').appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }

        function goBack() {
            document.getElementById('message-screen').classList.remove('active');
            document.getElementById('main-screen').classList.add('active');
            clearInterval(window.rainInterval);
            document.getElementById('heart-rain-container').innerHTML = '';
        }
    </script>
</body>
</html>
