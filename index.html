<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ჩემს პრინცესას</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Georgia', serif;
            background: radial-gradient(circle, #fff0f5 0%, #ffc0cb 100%);
            overflow: hidden;
            color: #5a2e3d;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        h1 {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 10px;
            padding: 0 20px;
        }

        .sub-text {
            font-size: 0.9rem;
            color: #d63384;
            margin-bottom: 30px;
        }

        .flowers-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .flower {
            font-size: 3.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .flower:active {
            transform: scale(0.8);
        }

        .message-content {
            background: rgba(255, 255, 255, 0.7);
            padding: 30px 20px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            z-index: 20;
            line-height: 1.6;
            font-size: 1.1rem;
            font-style: italic;
        }

        #back-button {
            margin-top: 25px;
            background: #ff69b4;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .explosion-heart {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: explode 0.8s ease-out forwards;
        }

            0% { transform: translate(0, 0) scale(1); opacity: 1; }
